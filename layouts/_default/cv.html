{{ define "main" }}
{{ $cv := .Site.Data.cv }}

<section class="page-header">
  <h1>Curriculum Vitae</h1>
  <a href="{{ $cv.personal.cv_pdf }}" class="btn" target="_blank" rel="noopener">Download PDF</a>
</section>

<section class="cv-embed">
  <object data="{{ $cv.personal.cv_pdf }}" type="application/pdf" width="100%" height="800px">
    <p>Your browser does not support embedded PDFs. <a href="{{ $cv.personal.cv_pdf }}">Download the CV here</a>.</p>
  </object>
</section>
{{ end }}
