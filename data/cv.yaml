publications:
  - authors: "Wu, Y., Davis, E. C., & Sohngen, B. L."
    title: "Crop Rotation and the Impact on Soil Carbon in the US Corn Belt"
    journal: "Carbon Balance and Management"
    year: 2025
    volume: "20(1), 6"
    doi: "https://doi.org/10.1186/s13021-025-00293-5"
    description: "Crop-species choices have often been overlooked as a way to build soil carbon. Using USDA Rapid Carbon Assessment data, we examine how corn-soybean rotation influences soil organic carbon (SOC) stocks in the Corn Belt. We show that corn is correlated with higher SOC than soybeans at 0-100 cm depth, and more years of corn means higher SOC -- an additional year of corn every 3 years increases SOC by 25.1%. Shifting rotations to plant corn in 2 of every 3 years across Ohio, Indiana, Iowa, and Illinois could increase SOC by 172.9 million Mg C, worth an estimated $117 billion in social cost of carbon terms."
    image: "/img/papers/raca.png"

working_papers:
  - title: "Waters of Change: Estimating Spatiotemporal Welfare Losses from Recurring Harmful Algal Blooms in Lake Erie Recreational Fishing"
    coauthors: "with F. Lupi and B. L. Sohngen"
    note: ""
    description: "We estimate spatiotemporal welfare losses from recurring HABs in Lake Erie using revealed preference data from Ohio's coast. Based on annual site-level fishing trip demand for 35 harbors from 1,788 zip codes across 2011-2018, we use a nested logit model to isolate HAB effects from other site and temporal characteristics. The most severe impacts occurred in 2015, with welfare losses of $364,111 and 10,248 lost trips. Simulating a 40% phosphorus reduction under the Great Lakes Water Quality Agreement yields average annual welfare benefits of $60,368. We also find spatial substitution patterns where anglers avoid the western basin in favor of less affected central basin sites."
    image: "/img/papers/welfare.png"
    available: "Manuscript available upon request."
  - title: "Who Stays, Who Leaves? Recreational Fishing Responses to Harmful Algal Blooms in Lake Erie"
    coauthors: "with B. L. Sohngen and S. A. Ludsin"
    description: "We provide the first comprehensive examination of behavioral and temporal heterogeneity in recreational fishing responses to HABs. Combining spatiotemporally varying cyanobacteria intensity measures with on-site counts of private boats, charter boats, and shore anglers across 36 Ohio Lake Erie harbors during 2011-2018, we use Poisson pseudo-maximum likelihood with a Control Function approach. Charter boats show the strongest response, followed by shore anglers and private boats. Shore anglers and private boats show stronger HAB avoidance on weekdays than weekends, while charter boats respond consistently. A 40% HAB reduction could increase fishing trips by 9-20%, while a 40% increase could reduce them by 6-13%."
    image: "/img/papers/lakeerie.png"
    available: "Manuscript available upon request."

